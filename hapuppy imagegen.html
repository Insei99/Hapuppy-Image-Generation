<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hapuppy Image Gen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #222230;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --text: #e8e8f0;
    --muted: #666680;
    --input-bg: #16161f;
    --success: #4aff9b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 16px;
    background-image: radial-gradient(ellipse at 20% 0%, #1a1035 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 100%, #0d1a2e 0%, transparent 50%);
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  header span {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .layout {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .card-title {
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-family: 'Space Mono', monospace;
  }

  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus,
  input[type="password"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  select option { background: #1a1a2e; }

  .btn-generate {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-generate .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-generate.loading .label { display: none; }
  .btn-generate.loading .spinner { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .output-area {
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }

  .placeholder-text {
    color: var(--muted);
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    text-align: center;
  }

  .images-grid {
    display: grid;
    gap: 10px;
    width: 100%;
  }

  .images-grid.n1 { grid-template-columns: 1fr; }
  .images-grid.n2 { grid-template-columns: 1fr 1fr; }
  .images-grid.n4 { grid-template-columns: 1fr 1fr; }

  .img-wrap {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    background: var(--input-bg);
    border: 1px solid var(--border);
  }

  .img-wrap img {
    width: 100%;
    display: block;
    border-radius: 8px;
  }

  .img-wrap .dl-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .error-box {
    background: #2a1020;
    border: 1px solid #ff4466;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: #ff7799;
    width: 100%;
  }

  .credits-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--success);
    background: rgba(74,255,155,0.08);
    border: 1px solid rgba(74,255,155,0.2);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Style preset pills */
  .style-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .style-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .style-pill:hover { border-color: var(--accent); color: var(--text); }
  .style-pill.active {
    border-color: var(--accent);
    background: rgba(124,106,255,0.15);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>☁ HAPUPPY</h1>
  <span>IMAGE GEN</span>
  <div class="header-right">
    <span id="modelTag" style="color: var(--accent)">—</span>
  </div>
</header>

<div class="layout">

  <!-- API Config -->
  <div class="card">
    <div class="card-title">⚙ Config</div>
    <div class="grid-2">
      <div class="field">
        <label>API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-..." />
      </div>
      <div class="field">
        <label>MODEL</label>
        <select id="model" onchange="updateModelTag()">
          <option value="gpt-image-1">gpt-image-1</option>
          <option value="gpt-image-1.5">gpt-image-1.5</option>
          <option value="gpt-image-2">gpt-image-2</option>
          <option value="flux-kontext-pro">flux-kontext-pro</option>
          <option value="flux-kontext-max">flux-kontext-max</option>
          <option value="midjourney">midjourney</option>
          <option value="recraft-v3">recraft-v3</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Prompt -->
  <div class="card">
    <div class="card-title">✏ Prompt</div>
    <div class="field">
      <label>POSITIVE</label>
      <textarea id="prompt" placeholder="Describe what you want to generate..."></textarea>
    </div>
    <div class="field">
      <label>NEGATIVE</label>
      <textarea id="negPrompt" placeholder="What to avoid..." style="min-height:55px"></textarea>
    </div>
  </div>

  <!-- Style Presets -->
  <div class="card">
    <div class="card-title">🎨 Style Preset</div>
    <div class="style-pills" id="stylePills">
      <div class="style-pill active" data-style="">None</div>
      <div class="style-pill" data-style="anime style, cel shading">Anime</div>
      <div class="style-pill" data-style="studio ghibli style, soft watercolor">Ghibli</div>
      <div class="style-pill" data-style="photorealistic, 8k, DSLR photo">Photo</div>
      <div class="style-pill" data-style="oil painting, impressionist, textured canvas">Oil Paint</div>
      <div class="style-pill" data-style="pixel art, 16-bit, retro game style">Pixel Art</div>
      <div class="style-pill" data-style="dark fantasy, dramatic lighting, cinematic">Dark Fantasy</div>
      <div class="style-pill" data-style="flat design, vector art, clean lines">Flat/Vector</div>
      <div class="style-pill" data-style="cyberpunk, neon lights, futuristic city">Cyberpunk</div>
      <div class="style-pill" data-style="pencil sketch, hand drawn, graphite">Sketch</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-title">🛠 Settings</div>
    <div class="grid-3">
      <div class="field">
        <label>SIZE</label>
        <select id="size">
          <option value="1024x1024">1024² (Square)</option>
          <option value="1792x1024">1792×1024 (Wide)</option>
          <option value="1024x1792">1024×1792 (Tall)</option>
          <option value="512x512">512² (Fast)</option>
        </select>
      </div>
      <div class="field">
        <label>QUALITY</label>
        <select id="quality">
          <option value="standard">Standard</option>
          <option value="hd">HD</option>
          <option value="high">High</option>
          <option value="low">Low (Fast)</option>
        </select>
      </div>
      <div class="field">
        <label>COUNT</label>
        <select id="count">
          <option value="1">1 image</option>
          <option value="2">2 images</option>
          <option value="4">4 images</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Generate Button -->
  <button class="btn-generate" id="genBtn" onclick="generate()">
    <span class="label">✦ GENERATE</span>
    <div class="spinner"></div>
  </button>

  <!-- Output -->
  <div class="card">
    <div class="card-title">🖼 Output</div>
    <div class="output-area" id="output">
      <div class="placeholder-text">Your images will appear here</div>
    </div>
  </div>

</div>

<script>
const BASE_URL = "https://beta.hapuppy.com/v1";
let selectedStyle = "";

// Style pill selection
document.querySelectorAll('.style-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    selectedStyle = pill.dataset.style;
  });
});

function updateModelTag() {
  document.getElementById('modelTag').textContent = document.getElementById('model').value;
}
updateModelTag();

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('model').value;
  const promptRaw = document.getElementById('prompt').value.trim();
  const negPrompt = document.getElementById('negPrompt').value.trim();
  const size = document.getElementById('size').value;
  const quality = document.getElementById('quality').value;
  const n = parseInt(document.getElementById('count').value);

  if (!apiKey) return showError("Paste your API key first.");
  if (!promptRaw) return showError("Enter a prompt.");

  // Build final prompt with style and negative
  let prompt = promptRaw;
  if (selectedStyle) prompt += `, ${selectedStyle}`;
  if (negPrompt) prompt += `. Avoid: ${negPrompt}`;

  const btn = document.getElementById('genBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const output = document.getElementById('output');
  output.innerHTML = `<div class="placeholder-text">Generating${n > 1 ? ` ${n} images` : ''}...</div>`;

  try {
    const body = { model, prompt, n, size, quality, response_format: "url" };

    const res = await fetch(`${BASE_URL}/images/generations`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error?.message || JSON.stringify(data));
    }

    const images = data.data;
    if (!images || images.length === 0) throw new Error("No images returned.");

    const gridClass = n === 1 ? 'n1' : n === 2 ? 'n2' : 'n4';
    output.innerHTML = `<div class="images-grid ${gridClass}" id="imgGrid"></div>`;
    const grid = document.getElementById('imgGrid');

    images.forEach((img, i) => {
      const url = img.url || (img.b64_json ? `data:image/png;base64,${img.b64_json}` : null);
      if (!url) return;
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      wrap.innerHTML = `
        <img src="${url}" alt="Generated image ${i+1}" loading="lazy" />
        <a class="dl-btn" href="${url}" download="hapuppy_${Date.now()}_${i}.png" target="_blank">↓ Save</a>
      `;
      grid.appendChild(wrap);
    });

  } catch (err) {
    showError(err.message || "Something went wrong.");
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  document.getElementById('output').innerHTML = `<div class="error-box">❌ ${msg}</div>`;
  document.getElementById('genBtn').classList.remove('loading');
  document.getElementById('genBtn').disabled = false;
}
</script>
</body>
</html>
