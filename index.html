<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hapuppy Image Gen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Anybody:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --panel: #0f0f1a;
    --border: #1e1e30;
    --accent: #00e5ff;
    --accent2: #ff4dff;
    --text: #dde0f0;
    --muted: #555570;
    --input-bg: #0b0b16;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 14px;
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(0,229,255,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, rgba(255,77,255,0.06) 0%, transparent 55%);
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Anybody', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tag {
    font-size: 0.58rem;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.08em;
  }

  .model-tag {
    margin-left: auto;
    font-size: 0.6rem;
    color: var(--accent);
    background: rgba(0,229,255,0.07);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .layout { display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px;
  }

  .card-title {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  label {
    display: block;
    font-size: 0.62rem;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.06em;
  }

  input[type="password"], textarea, select {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.76rem;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="password"]:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 75px; line-height: 1.5; }
  .field { margin-bottom: 11px; }
  .field:last-child { margin-bottom: 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  select option { background: #0f0f1a; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; }

  .pill {
    font-size: 0.58rem;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active {
    border-color: var(--accent);
    background: rgba(0,229,255,0.1);
    color: var(--accent);
  }

  .ratio-btns { display: flex; gap: 7px; flex-wrap: wrap; }

  .ratio-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .ratio-btn.active {
    border-color: var(--accent2);
    background: rgba(255,77,255,0.1);
    color: var(--accent2);
  }

  .btn-generate {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    color: #000;
    font-family: 'Anybody', sans-serif;
    font-weight: 900;
    font-size: 0.95rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-generate .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-generate.loading .label { display: none; }
  .btn-generate.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .output-area {
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }

  .placeholder {
    color: var(--muted);
    font-size: 0.7rem;
    text-align: center;
    line-height: 1.6;
  }

  .img-wrap {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    width: 100%;
  }

  .img-wrap img { width: 100%; display: block; }

  .save-hint {
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
  }

  .error-box {
    background: rgba(255,50,80,0.08);
    border: 1px solid rgba(255,50,80,0.3);
    border-radius: 8px;
    padding: 11px;
    font-size: 0.65rem;
    color: #ff7090;
    width: 100%;
    line-height: 1.6;
    word-break: break-all;
  }

  .debug-box {
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 8px;
    padding: 11px;
    font-size: 0.62rem;
    color: var(--muted);
    width: 100%;
    line-height: 1.6;
    word-break: break-all;
    white-space: pre-wrap;
  }

  .status-line {
    font-size: 0.62rem;
    color: var(--accent);
    text-align: center;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .model-text {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.6;
    padding: 10px;
    background: var(--input-bg);
    border-radius: 7px;
    border: 1px solid var(--border);
    width: 100%;
  }
</style>
</head>
<body>

<header>
  <h1>HAPUPPY</h1>
  <span class="tag">IMAGE GEN</span>
  <span class="model-tag" id="modelTag">gemini-3.1-flash</span>
</header>

<div class="layout">

  <div class="card">
    <div class="card-title">// config</div>
    <div class="grid-2">
      <div class="field">
        <label>API KEY</label>
        <input type="password" id="apiKey" placeholder="sk-hapuppy-..." />
      </div>
      <div class="field">
        <label>MODEL</label>
        <select id="model" onchange="updateTag()">
          <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash</option>
          <option value="gemini-3-pro-image-preview">Gemini 3 Pro</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">// prompt</div>
    <div class="field">
      <label>POSITIVE</label>
      <textarea id="prompt" placeholder="Describe what you want to generate..."></textarea>
    </div>
    <div class="field">
      <label>NEGATIVE (appended to prompt)</label>
      <textarea id="negPrompt" placeholder="What to avoid..." style="min-height:50px"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="card-title">// style preset</div>
    <div class="pills" id="stylePills">
      <div class="pill active" data-style="">None</div>
      <div class="pill" data-style="anime style, vibrant cel shading, detailed">Anime</div>
      <div class="pill" data-style="Studio Ghibli style, soft watercolor, painterly">Ghibli</div>
      <div class="pill" data-style="photorealistic, 8k, sharp detail, DSLR photo">Photo</div>
      <div class="pill" data-style="oil painting, impressionist brushwork, textured">Oil Paint</div>
      <div class="pill" data-style="pixel art, 16-bit, retro game aesthetic">Pixel Art</div>
      <div class="pill" data-style="dark fantasy, dramatic cinematic lighting, moody">Dark Fantasy</div>
      <div class="pill" data-style="cyberpunk, neon lights, rain-soaked streets, futuristic">Cyberpunk</div>
      <div class="pill" data-style="pencil sketch, detailed crosshatching, graphite">Sketch</div>
      <div class="pill" data-style="flat vector art, bold outlines, clean minimal">Flat/Vector</div>
      <div class="pill" data-style="watercolor painting, soft edges, translucent washes">Watercolor</div>
      <div class="pill" data-style="3D render, octane render, subsurface scattering, cinematic">3D Render</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">// aspect ratio</div>
    <div class="ratio-btns" id="ratioBtns">
      <button class="ratio-btn active" data-ratio="">Default</button>
      <button class="ratio-btn" data-ratio="square 1:1 aspect ratio">Square</button>
      <button class="ratio-btn" data-ratio="wide landscape 16:9 aspect ratio">Wide 16:9</button>
      <button class="ratio-btn" data-ratio="portrait 9:16 aspect ratio">Portrait</button>
      <button class="ratio-btn" data-ratio="widescreen cinematic 21:9 aspect ratio">Cinema</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">// extra</div>
    <div class="field">
      <label>EXTRA INSTRUCTIONS (optional)</label>
      <textarea id="extra" placeholder="e.g. high detail, dramatic lighting, trending on artstation..." style="min-height:50px"></textarea>
    </div>
  </div>

  <button class="btn-generate" id="genBtn" onclick="generate()">
    <span class="label">▶ GENERATE</span>
    <div class="spinner"></div>
  </button>

  <div class="card">
    <div class="card-title">// output</div>
    <div class="output-area" id="output">
      <div class="placeholder">Your generated image will appear here.<br>Uses Gemini via Hapuppy chat API.</div>
    </div>
  </div>

</div>

<script>
const BASE_URL = "https://beta.hapuppy.com/v1";
let selectedStyle = "";
let selectedRatio = "";

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    selectedStyle = p.dataset.style;
  });
});

document.querySelectorAll('.ratio-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.ratio-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    selectedRatio = b.dataset.ratio;
  });
});

function updateTag() {
  const m = document.getElementById('model').value;
  document.getElementById('modelTag').textContent = m.includes('flash') ? 'gemini-3.1-flash' : 'gemini-3-pro';
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const model  = document.getElementById('model').value;
  const promptRaw = document.getElementById('prompt').value.trim();
  const negPrompt = document.getElementById('negPrompt').value.trim();
  const extra = document.getElementById('extra').value.trim();

  if (!apiKey) return showError("Paste your Hapuppy API key.");
  if (!promptRaw) return showError("Enter a prompt.");

  // Strong prompt that forces image output from Gemini
  let fullPrompt = `Please generate and return an image showing: ${promptRaw}`;
  if (selectedStyle) fullPrompt += `. Art style: ${selectedStyle}`;
  if (selectedRatio) fullPrompt += `. Use a ${selectedRatio}`;
  if (extra) fullPrompt += `. ${extra}`;
  if (negPrompt) fullPrompt += `. Avoid showing: ${negPrompt}`;
  fullPrompt += `. Output the image directly.`;

  const btn = document.getElementById('genBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const output = document.getElementById('output');
  output.innerHTML = `<div class="status-line">▶ generating...</div>`;

  try {
    const res = await fetch(`${BASE_URL}/chat/completions`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model,
        messages: [{ role: "user", content: fullPrompt }],
        modalities: ["text", "image"],
        stream: false
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data?.error?.message || JSON.stringify(data));
    }

    const message = data?.choices?.[0]?.message;
const content = message?.content;
const images = message?.images;

// Handle images in the images array (Hapuppy's format)
if (images && images.length > 0) {
  output.innerHTML = "";
  for (const imgObj of images) {
    const url = imgObj?.image_url?.url || imgObj?.url;
    if (!url) continue;
    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';
    const img = document.createElement('img');
    img.src = url;
    img.alt = "Generated image";
    wrap.appendChild(img);
    output.appendChild(wrap);
    const hint = document.createElement('div');
    hint.className = 'save-hint';
    hint.textContent = 'Long press image → Save to Photos';
    output.appendChild(hint);
  }
  return;
}

if (!content) throw new Error("Empty response.\n\nRaw:\n" + JSON.stringify(data, null, 2).slice(0, 600));


    let imageData = null;
    let textContent = null;

    if (Array.isArray(content)) {
      for (const part of content) {
        // inline_data (Gemini native base64)
        if (part.inline_data) {
          imageData = `data:${part.inline_data.mime_type};base64,${part.inline_data.data}`;
        }
        // image_url style
        else if (part.type === "image_url") {
          imageData = part.image_url?.url;
        }
        // text part
        else if (part.type === "text" && part.text) {
          textContent = part.text;
        }
      }
    } else if (typeof content === "string") {
      if (content.startsWith("data:image") || content.startsWith("http")) {
        imageData = content;
      } else {
        textContent = content;
      }
    }

    output.innerHTML = "";

    if (imageData) {
      const wrap = document.createElement('div');
      wrap.className = 'img-wrap';
      const img = document.createElement('img');
      img.src = imageData;
      img.alt = "Generated image";
      wrap.appendChild(img);
      output.appendChild(wrap);

      const hint = document.createElement('div');
      hint.className = 'save-hint';
      hint.textContent = 'Long press image → Save to Photos';
      output.appendChild(hint);
    }

    if (textContent && !imageData) {
      // Model replied with text instead of image — show it as debug
      const textDiv = document.createElement('div');
      textDiv.className = 'debug-box';
      textDiv.textContent = "⚠ Model returned text instead of image:\n\n" + textContent.slice(0, 800);
      output.appendChild(textDiv);
    }

    if (!imageData && !textContent) {
      const debugDiv = document.createElement('div');
      debugDiv.className = 'debug-box';
      debugDiv.textContent = "⚠ Unknown response format:\n\n" + JSON.stringify(data, null, 2).slice(0, 800);
      output.appendChild(debugDiv);
    }

  } catch (err) {
    showError(err.message || "Something went wrong.");
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  document.getElementById('output').innerHTML = `<div class="error-box">❌ ${msg}</div>`;
  document.getElementById('genBtn').classList.remove('loading');
  document.getElementById('genBtn').disabled = false;
}
</script>
</body>
</html>
